<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人物誌｜浮花見月</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#f7f2eb;
    color:#3b2f2f;
    font-family:"Noto Serif TC","Source Han Serif TC","PMingLiU","MingLiU",serif;
}

.page{
    width:min(100%,1600px);
    margin:60px auto;
}

.page h1{
    text-align:center;
    font-size:42px;
    font-weight:400;
    letter-spacing:10px;
}

.intro{
    text-align:center;
    margin-top:18px;
    color:#8d7464;
    letter-spacing:3px;
    line-height:2;
}

.divider{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:70px auto;
}

.divider::before,
.divider::after{
    content:"";
    width:180px;
    height:1px;
    background:#cdbfb3;
}

.divider span{
    margin:0 18px;
    color:#8d7464;
}

.section{
    margin-bottom:90px;
}

.section h2{
    text-align:center;
    font-size:32px;
    font-weight:400;
    letter-spacing:10px;
    margin-bottom:45px;
}

.section img{
    display:block;
    width:100%;
    max-width:100%;
    height:auto;
    margin:auto;
    box-shadow:none;
    border-radius:0;
}

/* 側邊欄 */
#menuBtn{
    position:fixed;
    top:28px;
    right:32px;
    background:none;
    border:none;
    color:#8d7464;
    font-size:28px;
    cursor:pointer;
    z-index:1000;
    transition:.3s;
}

#menuBtn:hover{
    color:#3b2f2f;
    transform:scale(1.08);
}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:998;
}

#sidebar{
    position:fixed;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:#fffaf7;
    box-shadow:-4px 0 20px rgba(0,0,0,.12);
    padding:100px 30px 30px;
    transition:.3s;
    z-index:999;
}

#sidebar.active{
    right:0;
}

#sidebar h2{
    text-align:center;
    font-size:28px;
    font-weight:400;
    letter-spacing:8px;
    margin-bottom:12px;
}

.subTitle{
    text-align:center;
    color:#8d7464;
    font-size:14px;
    letter-spacing:4px;
    margin-bottom:40px;
}

#sidebar a{
    display:block;
    padding:16px 10px;
    color:#3b2f2f;
    text-decoration:none;
    font-size:18px;
    letter-spacing:2px;
    transition:.25s;
}

#sidebar a:hover{
    background:#f3e7de;
    padding-left:20px;
}

@media(max-width:768px){

    .page{
        width:92%;
        margin:60px auto;
    }

    .page h1{
        font-size:28px;
        letter-spacing:6px;
    }

    .intro{
        font-size:13px;
        letter-spacing:2px;
        margin-top:12px;
    }

    .divider{
        margin:28px auto;
    }

    .divider::before,
    .divider::after{
        width:110px;
    }

    .section{
        margin-bottom:70px;
    }

    .section h2{
        font-size:19px;
        letter-spacing:5px;
        margin-bottom:28px;
    }

    .section img{
        width:100%;
        max-width:100%;
    }

    #menuBtn{
        top:18px;
        right:20px;
        font-size:26px;
    }

    #sidebar{
        width:240px;
        right:-240px;
    }
}
</style>
</head>

<body>

<button id="menuBtn">☷</button>

<div id="overlay"></div>

<div id="sidebar">
    <h2>浮 花 見 月</h2>

    <div class="subTitle">
        諸葛瑾 ・ 裴婳
    </div>

    <a href="index.html">◈ 入　卷</a>
    <a href="characters.html">◈ 人物誌</a>
    <a href="story.html">◈ 故事卷</a>
    <a href="gallery.html">◈ 藏珍閣</a>
    <a href="thanks.html">◈ 鳴謝錄</a>
</div>

<main class="page">

    <h1>人 物 誌</h1>

    <p class="intro">
        紙上藏其形，筆下見其心
    </p>

    <div class="divider"><span>❈</span></div>

    <section class="section">
        <img src="images/character-info.png" alt="人物小傳">
    </section>

    <div class="divider"><span>❈</span></div>

    <section class="section">
        <h2>計 簿 抄 本</h2>
        <img src="images/jibu.jpg" alt="計簿抄本">
    </section>

    <div class="divider"><span>❈</span></div>

    <section class="section">
        <h2>繪 像 錄</h2>
        <img src="images/portrait.jpg" alt="繪像錄">
    </section>

</main>

<script>
const menuBtn=document.getElementById("menuBtn");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

menuBtn.onclick=function(){
    sidebar.classList.add("active");
    overlay.style.display="block";
}

overlay.onclick=function(){
    sidebar.classList.remove("active");
    overlay.style.display="none";
}
</script>

</body>
</html>
