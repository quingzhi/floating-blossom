<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鳴謝錄｜浮花見月</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#f7f2eb;
    color:#3b2f2f;
    font-family:"Noto Serif TC","Source Han Serif TC","PMingLiU","MingLiU",serif;
    min-height:100vh;
}

.page{
    width:70%;
    max-width:760px;
    margin:auto;
    padding:90px 0;
    text-align:center;
}

h1{
    font-size:42px;
    font-weight:normal;
    letter-spacing:10px;
    margin-bottom:16px;
}

.sub{
    color:#8d7464;
    letter-spacing:3px;
    margin-bottom:60px;
}

.section{
    border-top:1px solid #d8c7ba;
    padding:38px 0;
}

.section:last-child{
    border-bottom:1px solid #d8c7ba;
}

.section h2{
    font-size:24px;
    font-weight:normal;
    letter-spacing:8px;
    color:#8d7464;
    margin-bottom:24px;
}

.names{
    font-size:20px;
    line-height:2.4;
    letter-spacing:3px;
}

.copyright{
    margin-top:40px;

    color:#9b8d82;
    font-size:13px;
    line-height:2;
    letter-spacing:1px;
}

/* 右側選單 */
#menuBtn{
    position:fixed;
    top:28px;
    right:32px;

    background:none;
    border:none;

    color:#8d7464;

    font-size:28px;

    cursor:pointer;

    z-index:1000;

    transition:.3s;
}

#menuBtn:hover{
    color:#3b2f2f;
    transform:scale(1.08);
}
#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:998;
}

#sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:300px;
    height:100%;
    background:#fffaf7;
    box-shadow:-4px 0 20px rgba(0,0,0,.12);
    transition:.3s;
    padding:100px 30px 30px;
    z-index:999;
}

#sidebar.active{right:0;}

#sidebar h2{
    text-align:center;
    font-size:28px;
    font-weight:normal;
    letter-spacing:8px;
    margin-bottom:12px;
}

.subTitle{
    text-align:center;
    color:#8d7464;
    font-size:14px;
    letter-spacing:2px;
    margin-bottom:40px;
}

#sidebar a{
    display:block;
    padding:16px 10px;
    color:#3b2f2f;
    text-decoration:none;
    font-size:18px;
    letter-spacing:2px;
}

#sidebar a:hover{
    background:#f3e7de;
    padding-left:20px;
}

@media(max-width:768px){

    .page{
        width:92%;
        max-width:420px;
        padding:60px 0;
    }

    h1{
        font-size:28px;
        letter-spacing:6px;
        font-weight:400;
        margin-bottom:12px;
    }

    .sub{
        font-size:13px;
        letter-spacing:2px;
        margin-bottom:42px;
    }

    .section{
        padding:28px 0;
    }

    .section h2{
        font-size:19px;
        letter-spacing:5px;
        margin-bottom:18px;
    }

    .names{
        font-size:16px;
        line-height:2.3;
        letter-spacing:1px;
    }

   
.copyright{
    margin-top:30px;
    font-size:11px;
    line-height:2;
}

    #menuBtn{
        top:18px;
        right:20px;
        font-size:26px;
    }

    #sidebar{
        width:240px;
        right:-240px;
    }

    #sidebar h2{
        font-size:24px;
        letter-spacing:6px;
    }

    .subTitle{
        font-size:13px;
        letter-spacing:3px;
    }

    #sidebar a{
        font-size:17px;
    }
}
</style>
</head>

<body>

<button id="menuBtn">☷</button>
<div id="overlay"></div>

<div id="sidebar">
    <h2>浮 花 見 月</h2>
    <div class="subTitle">諸葛瑾 ・ 裴婳</div>

    <a href="index.html">◈ 入　卷</a>
    <a href="characters.html">◈ 人物誌</a>
    <a href="story.html">◈ 故事卷</a>
    <a href="gallery.html">◈ 藏珍閣</a>
    <a href="thanks.html">◈ 鳴謝錄</a>
</div>

<main class="page">

    <h1>鳴謝錄</h1>
    <div class="sub">特別感謝</div>

    <section class="section">
        <h2>繪</h2>
        <div class="names">
            舟行綠水<br>
            無毛兩足生物<br>
            上漿<br>
            橙綠時<br>
            枕蟬<br>
            樂下迷迭<br>
            硯山<br>
            蟬衣<br>
            Mmmilk
        </div>
    </section>

    <section class="section">
        <h2>文</h2>
        <div class="names">
            不知事<br>
            筱梨<br>
            鹿知渝
        </div>
    </section>

    <section class="section">
        <h2>映</h2>
        <div class="names">
            林啟明
        </div>
    </section>

    <section class="section">
        <h2>製</h2>
        <div class="names">
            敘笙
        </div>
    </section>

 <section class="section"></section>

<div class="copyright">

</div>

</main>

<script>
const menuBtn=document.getElementById("menuBtn");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

menuBtn.onclick=function(){
    sidebar.classList.add("active");
    overlay.style.display="block";
}

overlay.onclick=function(){
    sidebar.classList.remove("active");
    overlay.style.display="none";
}
</script>

</body>
</html>
