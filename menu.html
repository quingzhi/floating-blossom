<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目錄｜浮花見月</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f7f2eb;
    color:#3b2f2f;
    font-family:"Noto Serif TC",serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

}

.container{

    text-align:center;
    width:500px;

}

h1{

    font-size:40px;
    font-weight:normal;
    letter-spacing:10px;

}

.sub{

    color:#8d7464;
    margin-top:15px;
    letter-spacing:3px;
    font-size:15px;

}

.line{

    width:180px;
    height:1px;
    background:#d5c8bc;

    margin:40px auto;

}

.title{

    font-size:24px;
    letter-spacing:8px;
    color:#8d7464;

}

.menu{

    margin-top:45px;

}

.menu a{

    display:block;

    color:#3b2f2f;

    text-decoration:none;

    font-size:22px;

    letter-spacing:5px;

    padding:18px 0;

    transition:.3s;

}

.menu a:hover{

    color:#8d7464;

    letter-spacing:10px;

}

.footer{

    margin-top:70px;

    color:#9b8d82;

    font-size:14px;

    letter-spacing:3px;

}

.fade{

    opacity:0;

    transform:translateY(20px);

    animation:fade .8s forwards;

}

.fade:nth-child(1){animation-delay:.1s;}
.fade:nth-child(2){animation-delay:.25s;}
.fade:nth-child(3){animation-delay:.45s;}
.fade:nth-child(4){animation-delay:.65s;}
.fade:nth-child(5){animation-delay:.85s;}
.fade:nth-child(6){animation-delay:1.05s;}

@keyframes fade{

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="fade">

<h1>浮 花 見 月</h1>

<div class="sub">

</div>

</div>

</div>

<div class="menu">

<a class="fade" href="story.html">

<a class="fade" href="gallery.html">

</a>

</div>

<div class="line fade"></div>

<div class="footer fade">
始於　2024.05.28
</div>

</div>

</body>
</html>
