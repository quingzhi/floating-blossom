<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藏珍閣｜浮花見月</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f2eb;
    color:#3b2f2f;
    font-family:"Noto Serif TC","Source Han Serif TC","PMingLiU","MingLiU",serif;
    min-height:100vh;
}

/* 頁面 */
.page{
    width:min(92%,1200px);
    margin:90px auto;
    text-align:center;
}

.page h1{
    font-size:40px;
    font-weight:400;
    letter-spacing:10px;
}

.intro{
    margin-top:18px;
    color:#8d7464;
    font-size:15px;
    letter-spacing:3px;
    line-height:2;
}

.divider{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:55px auto 65px;
}

.divider::before,
.divider::after{
    content:"";
    width:170px;
    height:1px;
    background:#cdbfb3;
}

.divider span{
    margin:0 20px;
    color:#8d7464;
}

/* 置物櫃 */
.cabinet{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    column-gap:52px;
    row-gap:78px;
    align-items:end;
}

.artifact{
    appearance:none;
    border:none;
    background:none;
    font-family:inherit;
    color:#3b2f2f;
    cursor:pointer;
    text-align:center;
    min-width:0;
}

.artifact-image{
    height:260px;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding:10px 10px 0;
}

.artifact-image img{
    display:block;
    max-width:100%;
    max-height:245px;
    width:auto;
    height:auto;
    object-fit:contain;
    transition:
        transform .35s ease,
        filter .35s ease;
}

.artifact:hover .artifact-image img{
    transform:translateY(-6px) scale(1.03);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.08));
}

/* 木架 */
/* 展示架（極簡水墨風） */
.shelf{
    position:relative;
    width:68%;
    height:0;
    margin:12px auto 0;
    border-top:2px solid rgba(141,116,100,.45);
}

.shelf::before{
    content:"";
    position:absolute;
    left:-3px;
    top:-2px;
    width:8px;
    height:3px;
    background:rgba(141,116,100,.45);
    border-radius:50%;
}

.shelf::after{
    content:"";
    position:absolute;
    right:-3px;
    top:-2px;
    width:6px;
    height:2px;
    background:rgba(141,116,100,.3);
    border-radius:50%;
}

/* 結尾 */
.ending{
    margin:95px 0 20px;
    color:#8d7464;
    line-height:2.4;
    letter-spacing:3px;
}

/* 介紹卡彈窗 */
#artifactModal{
    display:none;
    position:fixed;
    inset:0;
    z-index:2000;
    background:rgba(35,27,24,.72);
    padding:45px 20px;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:opacity .25s ease;
}

#artifactModal.active{
    display:flex;
    opacity:1;
}

.modalBox{
    position:relative;
    max-width:min(88vw,820px);
    max-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:cardAppear .3s ease;
}

#artifactCard{
    display:block;
    max-width:100%;
    max-height:88vh;
    width:auto;
    height:auto;
    object-fit:contain;
    opacity:.76;
    box-shadow:0 18px 55px rgba(0,0,0,.24);
}



@keyframes cardAppear{
    from{
        opacity:0;
        transform:translateY(12px) scale(.97);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* 右側選單 */
#menuBtn{
    position:fixed;
    top:28px;
    right:32px;
    background:none;
    border:none;
    color:#8d7464;
    font-size:28px;
    cursor:pointer;
    z-index:1000;
    transition:.3s;
}

#menuBtn:hover{
    color:#3b2f2f;
    transform:scale(1.08);
}

#sidebarOverlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:998;
}

#sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:300px;
    height:100%;
    background:#fffaf7;
    box-shadow:-4px 0 20px rgba(0,0,0,.12);
    transition:.3s;
    padding:100px 30px 30px;
    z-index:999;
}

#sidebar.active{
    right:0;
}

#sidebar h2{
    text-align:center;
    font-size:28px;
    font-weight:400;
    letter-spacing:8px;
    color:#3b2f2f;
    margin-bottom:12px;
}

.subTitle{
    text-align:center;
    color:#8d7464;
    font-size:14px;
    letter-spacing:2px;
    margin-bottom:40px;
}

#sidebar a{
    display:block;
    padding:16px 10px;
    color:#3b2f2f;
    text-decoration:none;
    font-size:18px;
    letter-spacing:2px;
    transition:.25s;
}

#sidebar a:hover{
    background:#f3e7de;
    padding-left:20px;
}

/* 平板 */
@media(max-width:950px){

    .cabinet{
        grid-template-columns:repeat(2,1fr);
        column-gap:36px;
    }
}

/* 手機 */
@media(max-width:768px){

    .page{
        width:94%;
        margin:60px auto;
    }

    .page h1{
        font-size:28px;
        letter-spacing:6px;
    }

    .intro{
        margin-top:12px;
        font-size:13px;
        letter-spacing:2px;
    }

    .divider{
        margin:28px auto 42px;
    }

    .divider::before,
    .divider::after{
        width:90px;
    }

    .divider span{
        margin:0 15px;
    }

    .cabinet{
        grid-template-columns:repeat(2,minmax(0,1fr));
        column-gap:18px;
        row-gap:48px;
    }

    .artifact-image{
    height:160px;
    padding:0;
}

.artifact-image img{
    max-height:150px;
}

    .artifact:hover .artifact-image img{
        transform:none;
        filter:none;
    }
.shelf{
    position:relative;
    width:62%;
    height:0;
    margin:8px auto 0;
    border-top:1.5px solid rgba(141,116,100,.45);
}

.shelf::before{
    content:"";
    position:absolute;
    left:-2px;
    top:-1.5px;
    width:6px;
    height:2px;
    background:rgba(141,116,100,.45);
    border-radius:50%;
}

.shelf::after{
    content:"";
    position:absolute;
    right:-2px;
    top:-1.5px;
    width:5px;
    height:1.5px;
    background:rgba(141,116,100,.3);
    border-radius:50%;
}
    .ending{
        margin:65px 0 10px;
        font-size:14px;
        letter-spacing:2px;
    }

    #artifactModal{
        padding:25px 12px;
    }

    .modalBox{
        max-width:94vw;
        max-height:90vh;
    }

    #artifactCard{
        max-height:86vh;
        opacity:.76;
    }


    #menuBtn{
        top:18px;
        right:20px;
        font-size:26px;
    }

    #sidebar{
        width:240px;
        right:-240px;
        padding:90px 28px 30px;
    }

    #sidebar h2{
        font-size:22px;
        letter-spacing:5px;
        margin-bottom:10px;
    }

    .subTitle{
        font-size:12px;
        letter-spacing:2px;
        margin-bottom:30px;
    }

    #sidebar a{
        padding:13px 10px;
        font-size:15px;
    }
}

/* 手機提示 */
#tapHint{
    position:fixed;
    left:50%;
    bottom:42px;
    transform:translateX(-50%) translateY(10px);

    padding:10px 18px;
    border-radius:999px;

    background:rgba(255,250,247,.9);
    color:#8d7464;

    font-size:13px;
    letter-spacing:2px;
    white-space:nowrap;

    opacity:0;
    visibility:hidden;
    pointer-events:none;

    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:opacity .6s ease, transform .6s ease, visibility .6s;

    z-index:3000;
}

#tapHint.show{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(0);
}

@media(min-width:769px){
    #tapHint{
        display:none;
    }

}
</style>
</head>

<body>

<button id="menuBtn" aria-label="開啟選單">☷</button>
<div id="sidebarOverlay"></div>

<div id="sidebar">
    <h2>浮 花 見 月</h2>

    <div class="subTitle">
        諸葛瑾 ・ 裴婳
    </div>

    <a href="index.html">◈ 入　卷</a>
    <a href="characters.html">◈ 人物誌</a>
    <a href="story.html">◈ 故事卷</a>
    <a href="gallery.html">◈ 藏珍閣</a>
    <a href="thanks.html">◈ 鳴謝錄</a>
</div>

<main class="page">

    <h1>藏 珍 閣</h1>

    <p class="intro">
        物有其形，情有所寄
    </p>

    <div class="divider"><span>❈</span></div>

    <section class="cabinet">

        <button class="artifact" data-card="images/紙鳶a.PNG" aria-label="查看紙鳶">
            <div class="artifact-image">
                <img src="images/紙鳶.png" alt="紙鳶">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/長命鎖a.PNG" aria-label="查看長命鎖">
            <div class="artifact-image">
                <img src="images/長命鎖.png" alt="長命鎖">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/桃花酥a.PNG" aria-label="查看桃花酥">
            <div class="artifact-image">
                <img src="images/桃花酥.png" alt="桃花酥">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/裂玉a.PNG" aria-label="查看裂玉">
            <div class="artifact-image">
                <img src="images/裂玉.png" alt="裂玉">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/紅繩手串a.PNG" aria-label="查看紅繩手串">
            <div class="artifact-image">
                <img src="images/紅繩手串.png" alt="紅繩手串">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/言事章a.PNG" aria-label="查看言事章">
            <div class="artifact-image">
                <img src="images/言事章.png" alt="言事章">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/長安a.PNG" aria-label="查看長安">
            <div class="artifact-image">
                <img src="images/長安.png" alt="長安">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/丹青a.PNG" aria-label="查看丹青">
            <div class="artifact-image">
                <img src="images/丹青.png" alt="丹青">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/長弓a.PNG" aria-label="查看長弓">
            <div class="artifact-image">
                <img src="images/長弓.png" alt="長弓">
            </div>
            <div class="shelf"></div>
        </button>

        <button class="artifact" data-card="images/計簿殘頁a.PNG" aria-label="查看計簿殘頁">
            <div class="artifact-image">
                <img src="images/計簿殘頁.png" alt="計簿殘頁">
            </div>
            <div class="shelf"></div>
        </button>

    </section>

    <p class="ending">
        故事雖盡<br>
        故物長存
    </p>

</main>

<div id="tapHint">
    輕觸藏品，可閱其卷 
</div>

<!-- 介紹卡彈窗 -->
<div id="artifactModal" aria-hidden="true">

    <div class="modalBox">

        <img id="artifactCard" src="" alt="物件介紹卡">

    </div>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");

const artifactButtons = document.querySelectorAll(".artifact");
const artifactModal = document.getElementById("artifactModal");
const artifactCard = document.getElementById("artifactCard");


/* 側邊欄 */
menuBtn.onclick = function(){
    sidebar.classList.add("active");
    sidebarOverlay.style.display = "block";
};

sidebarOverlay.onclick = function(){
    sidebar.classList.remove("active");
    sidebarOverlay.style.display = "none";
};

/* 開啟介紹卡 */
artifactButtons.forEach(function(button){

    button.addEventListener("click",function(){

        const cardPath = button.dataset.card;

        artifactCard.src = cardPath;
        artifactCard.alt = "物件介紹卡";

        artifactModal.style.display = "flex";

        requestAnimationFrame(function(){
            artifactModal.classList.add("active");
        });

        artifactModal.setAttribute("aria-hidden","false");
        document.body.style.overflow = "hidden";
    });

});

/* 關閉介紹卡 */
function hideArtifactModal(){

    artifactModal.classList.remove("active");
    artifactModal.setAttribute("aria-hidden","true");
    document.body.style.overflow = "";

    setTimeout(function(){
        artifactModal.style.display = "none";
        artifactCard.src = "";
    },250);
}

/* 點背景關閉 */
artifactModal.addEventListener("click",function(event){

    if(event.target === artifactModal){
        hideArtifactModal();
    }

});

/* Esc 關閉 */
document.addEventListener("keydown",function(event){

    if(event.key === "Escape" && artifactModal.classList.contains("active")){
        hideArtifactModal();
    }

});
/* 手機版進入提示 */
const tapHint = document.getElementById("tapHint");

if(window.innerWidth <= 768){

    window.addEventListener("load",function(){

        setTimeout(function(){
            tapHint.classList.add("show");
        },800);

        setTimeout(function(){
            tapHint.classList.remove("show");
        },3800);

    });

}

</script>

</body>
</html>
